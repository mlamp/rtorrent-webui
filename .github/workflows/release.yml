name: Release

# CalVer tags (YYYY.0M.MICRO) trigger a multi-arch image build + push to ghcr.
# The Dockerfile builds the SPA on BUILDPLATFORM and cross-compiles the static Go
# binary, so no QEMU/emulation is needed for arm64. scripts/release.sh remains a
# local fallback that does the same thing; this job no-ops if the tag's image
# already exists (e.g. release.sh already pushed it).
on:
  push:
    tags: ['[0-9][0-9][0-9][0-9].[0-9][0-9].*']

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Skip if this image tag already exists
        id: exists
        run: |
          if docker buildx imagetools inspect "ghcr.io/mlamp/rtorrent-webui:${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "image ghcr.io/mlamp/rtorrent-webui:${GITHUB_REF_NAME} already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v4
        if: steps.exists.outputs.skip == 'false'
      - uses: docker/login-action@v4
        if: steps.exists.outputs.skip == 'false'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        if: steps.exists.outputs.skip == 'false'
        with:
          images: ghcr.io/mlamp/rtorrent-webui
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        if: steps.exists.outputs.skip == 'false'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
