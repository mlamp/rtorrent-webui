name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run web-install
      - run: mise run web-build # web/dist must exist before go:embed compiles
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: mise run test
      - name: govulncheck
        # `go run …@latest` avoids the GOBIN/GOPATH-mismatch under the mise-managed
        # toolchain that left `go install`'s binary unfound ($(go env GOPATH)/bin/govulncheck:
        # No such file or directory -> exit 127). No install step, no PATH lookup.
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./cmd/... ./internal/...

  race:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run web-install
      - run: mise run web-build
      - run: mise run test-race # CGO_ENABLED=1 is set by the mise task

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run web-install
      - name: svelte-check + tsc
        run: cd web && pnpm run check
      - name: unit tests
        run: cd web && pnpm run test:unit
