# rtorrent-webui configuration

[server]
listen = "0.0.0.0:8080"            # HTTP bind for the web UI + API

[rtorrent]
socket            = "/var/run/rtorrent/scgi.socket"  # SCGI unix socket (or host:port)
view              = "main"         # rtorrent view to poll
poll_interval     = "1s"           # LIVE cadence while a browser is watching -> SSE delta rate
idle_poll_interval = "30s"         # background cadence with no client open (history still recorded;
                                   # cumulative counters keep totals exact, only burst shape is coarser)
max_inflight      = 8              # concurrent SCGI connections cap
max_upload_mb = 12                 # reject .torrent uploads larger than this

[auth]
mode  = "none"                     # "none" (trust a fronting reverse proxy) | "basic"
realm = "rtorrent-webui"
# htpasswd_file = "/config/htpasswd"   # apache htpasswd (bcrypt) — takes precedence
# [[auth.users]]                    # inline users (bcrypt; generate with `genhash <pw>`)
#   name = "admin"
#   password_hash = "$2y$12$REPLACE_ME"

[downloads]
dirs        = ["/downloads"]       # statfs targets for /api/diskspace
default_dir = "/downloads"

[insight]
# Bundled DB-IP Lite Country (CC BY 4.0) — peer flags work out of the box.
# Point at your own MaxMind GeoLite2-Country.mmdb instead if you prefer; empty disables.
geoip_db          = "/usr/share/GeoIP/dbip-country-lite.mmdb"
history_db        = "/data/history.db"  # SQLite time series; empty disables history
# Retention is multi-tier and fixed: raw 15m / 1m 24h / 1h 7d / 1d 1y. Stored as
# cumulative byte counters; rates are derived at query time so gaps self-heal.
search_enabled    = false          # tracker-search seam (no adapters in v1)

[features]
rpc_passthrough = false            # enable POST /api/rpc (JSON, allow/deny filtered)
rpc_allowlist   = []               # if non-empty, only these methods are callable
rpc_denylist    = ["execute.throw", "execute.capture", "execute.nothrow", "system.shutdown"]

# Raw XML-RPC proxy: a byte-pipe to rtorrent's SCGI, the same thing nginx's
# `scgi_pass` does. Turn this on and point *arr (Sonarr/Radarr/Lidarr/…) at
# http://<host>:8080/RPC2 instead of running a separate nginx shim.
# SECURITY: UNFILTERED — full control of rtorrent (incl. execute.*). It inherits
# the [auth] section above: with auth.mode="basic" clients must authenticate
# (http://user:pass@host/RPC2, like nginx+ruTorrent sharing an htpasswd); with
# auth.mode="none" it is open, so keep it on an internal network only.
rpc_proxy       = false            # enable the /RPC2 byte-pipe
rpc_proxy_path  = "/RPC2"          # mount point (the rtorrent convention); must not
                                   # collide with /healthz or /api/* — those fall back to /RPC2

delete_with_data = false           # allow DELETE to also remove files (wired later)
