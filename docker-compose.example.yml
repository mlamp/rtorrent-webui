# The full lean stack: the clean rtorrent daemon + the rtorrent-webui sidecar, sharing
# the SCGI socket. No nginx / PHP / ruTorrent. Both images are distroless and run as the
# same nonroot uid (65532), so they share the socket with no extra permissions.
services:
  rtorrent:
    image: ghcr.io/mlamp/rtorrent:latest       # clean rtorrent v0.16.13 daemon (SCGI EPIPE fix baked in)
    restart: unless-stopped
    volumes:
      - rtorrent-socket:/run/rtorrent          # SCGI socket dir, shared with the webui
      - rtorrent-session:/session              # rtorrent session state
      - ./downloads:/downloads                 # download tree (must be writable by uid 65532)
    ports:
      - "6881:6881"                            # BitTorrent peer port (TCP)
      - "6881:6881/udp"                        # DHT / uTP
    # Override the baked /etc/rtorrent/rtorrent.rc by mounting your own if needed:
    #   - ./rtorrent.rc:/etc/rtorrent/rtorrent.rc:ro

  webui:
    image: ghcr.io/mlamp/rtorrent-webui:latest
    restart: unless-stopped
    depends_on: [rtorrent]
    command: ["-rtorrent", "/run/rtorrent/scgi.socket"]   # point at the shared socket
    ports:
      # Published on loopback only: the default config ships auth.mode=none, so anyone who
      # can reach the port has full control. Use 127.0.0.1, or front with a reverse proxy,
      # or enable auth.mode=basic before binding to 0.0.0.0 ("8080:8080").
      - "127.0.0.1:8080:8080"
    # To let Sonarr/Radarr/… drive rtorrent through this container instead of a separate
    # nginx scgi_pass shim, set features.rpc_proxy = true in config.toml and point the
    # *arr clients at http://webui:8080/RPC2 (path "/RPC2").
    volumes:
      - rtorrent-socket:/run/rtorrent          # shared SCGI socket (same nonroot uid 65532)
      - ./downloads:/downloads:ro              # for /api/diskspace (read-only is fine)
      - webui-data:/data                       # SQLite history persistence
      - ./geoip:/data/geoip:ro                 # optional: MaxMind/DB-IP mmdb for peer flags
      - ./config.toml:/etc/rtorrent-webui/config.toml:ro  # optional: override the baked config

volumes:
  rtorrent-socket:
  rtorrent-session:
  webui-data:
